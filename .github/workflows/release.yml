name: Release

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Publish packages
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-packagist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split pest-llm subtree and push to mirror repo
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGIST_SPLIT_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          git subtree split --prefix=packages/pest-llm -b pest-llm-split

          git remote add pest-llm-mirror "https://x-access-token:${GITHUB_TOKEN}@github.com/heilgar/pest-llm.git"

          git push pest-llm-mirror pest-llm-split:main --force
          git tag -f "$TAG" pest-llm-split
          git push pest-llm-mirror "$TAG" --force
