<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Store Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1a2e; color: white; padding: 16px 24px; font-size: 18px; font-weight: 600; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #1a1a2e; color: white; }
    .assistant { align-self: flex-start; background: white; border: 1px solid #e0e0e0; }
    .loading { align-self: flex-start; color: #999; font-style: italic; }
    #input-area { display: flex; gap: 8px; padding: 16px 24px; background: white; border-top: 1px solid #e0e0e0; }
    #chat-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
    #chat-input:focus { border-color: #1a1a2e; }
    #send-button { padding: 12px 24px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    #send-button:hover { background: #16213e; }
    #send-button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>Acme Store Support</header>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="chat-input" data-testid="chat-input" placeholder="Type your message..." autocomplete="off">
    <button id="send-button" data-testid="send-button">Send</button>
  </div>
  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-button');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      if (role === 'assistant') div.setAttribute('data-testid', 'chat-output');
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage(message, 'user');

      const loading = addMessage('Thinking...', 'loading');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        loading.remove();
        addMessage(data.text || 'No response', 'assistant');
      } catch (err) {
        loading.remove();
        addMessage('Error: ' + err.message, 'assistant');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
